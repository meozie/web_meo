<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Sản Phẩm 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #fff0f5; --text-color: #5c404c; --card-bg: #ffffff; --nav-bg: #ffb6c1; --btn-color: #ff69b4; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; }
        .detail-container { max-width: 800px; margin: 40px auto; }
        .back-link { display: block; margin-bottom: 20px; color: var(--btn-color); text-decoration: none; font-weight: bold; }
        
        .header-box { background: var(--card-bg); padding: 30px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* TAB SYSTEM */
        .tabs { display: flex; gap: 10px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: #eee; cursor: pointer; border-radius: 10px; font-weight: bold; }
        .tab-btn.active { background: var(--btn-color); color: white; }
        .tab-content { background: var(--card-bg); padding: 30px; border-radius: 20px; min-height: 200px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .pane { display: none; line-height: 1.8; }
        .pane.active { display: block; }
        .download-btn { display: block; text-align: center; background: var(--btn-color); color: white; padding: 15px; margin-top: 20px; border-radius: 15px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="detail-container">
        <a href="index.html" class="back-link">← Quay lại trang chủ</a>
        
        <div class="header-box">
            <h1>Món Đồ Cute 1</h1>
            <p>Phiên bản mới nhất 2026</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(0)">Mô tả</button>
            <button class="tab-btn" onclick="switchTab(1)">Cách dùng</button>
            <button class="tab-btn" onclick="switchTab(2)">Quà tặng</button>
        </div>

        <div class="tab-content">
            <div class="pane active">Nội dung mô tả sản phẩm 1 nằm ở đây...</div>
            <div class="pane">Hướng dẫn sử dụng sản phẩm 1...</div>
            <div class="pane">Danh sách quà tặng kèm theo...</div>
        </div>

        <a href="#" class="download-btn">⬇️ TẢI XUỐNG NGAY</a>
    </div>

    <script>
        function switchTab(idx) {
            const btns = document.querySelectorAll('.tab-btn');
            const panes = document.querySelectorAll('.pane');
            btns.forEach((b, i) => {
                b.classList.toggle('active', i === idx);
                panes[i].classList.toggle('active', i === idx);
            });
        }
    </script>
</body>
</html>
