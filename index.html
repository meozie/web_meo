<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Linh Tinh 🎐</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fff0f5;
            --text-color: #5c404c;
            --card-bg: #ffffff;
            --nav-bg: #ffb6c1;
            --btn-color: #ff69b4;
            --shadow: 0 4px 15px rgba(255, 105, 180, 0.2);
        }

        .dark-mode {
            --bg-color: #2b2b36;
            --text-color: #f8f8f2;
            --card-bg: #383a59;
            --nav-bg: #1e1e28;
            --btn-color: #bd93f9;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; transition: 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; min-height: 100vh; }

        /* --- TUYẾT RƠI --- */
        .snowflake { position: fixed; top: -10px; color: white; user-select: none; z-index: 9999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(105vh); } }

        /* --- NAV & CONTAINER --- */
        nav { background-color: var(--nav-bg); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: 700; text-decoration: none; color: var(--text-color); }
        .nav-btns { display: flex; gap: 10px; }
        .toggle-btn { background-color: var(--card-bg); border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; color: var(--text-color); font-size: 13px; }
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; text-align: center; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .product-card { background-color: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: var(--shadow); transition: transform 0.3s ease; }
        .product-card:hover { transform: translateY(-8px); }
        
        /* Nút kiểu cũ của em */
        .btn { background-color: var(--btn-color); color: white; border: none; padding: 10px 20px; border-radius: 15px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 10px; }

        /* --- MODAL TO RỘNG --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; padding: 10px; }
        .modal-content { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 600px; 
            min-height: 400px;
            border-radius: 30px; 
            overflow: hidden; 
            position: relative; 
            animation: slideUp 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-tabs { display: flex; background: rgba(0,0,0,0.05); border-bottom: 1px solid #ddd; }
        .modal-tab-btn { flex: 1; padding: 18px; border: none; background: none; cursor: pointer; font-weight: bold; color: #666; font-size: 16px; }
        .modal-tab-btn.active { background: var(--card-bg); color: var(--btn-color); border-bottom: 4px solid var(--btn-color); }

        .modal-body { padding: 30px; flex-grow: 1; text-align: left; font-size: 17px; }
        .tab-pane { display: none; line-height: 1.8; }
        .tab-pane.active { display: block; }

        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; z-index: 10; color: #888; }
        footer { text-align: center; padding: 30px; background-color: var(--nav-bg); margin-top: 50px; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">🌸 Share Linh Tinh</a>
        <div class="nav-btns">
            <button class="toggle-btn" id="snow-toggle" onclick="toggleSnow()">❄️ Tuyết: Tắt</button>
            <button class="toggle-btn" id="theme-toggle" onclick="toggleTheme()">🌙 Tối Đi</button>
        </div>
    </nav>

    <div class="container">
        <h1>Chào mừng đến với Share Linh Tinh 🎀</h1>
        <p>Tổng hợp những thứ nhỏ bé nhưng mang lại niềm vui lớn.</p>
        
        <div class="product-grid">
            <div class="product-card">
                <div style="font-size: 60px;">📦</div>
                <h3>Món Đồ Cute 1</h3>
                <p>Một món quà bí mật dành cho bạn.</p>
                <button class="btn" onclick="openModal('Món Đồ Cute 1', 'Mô tả chi tiết sản phẩm nằm ở đây.', '1. Giải nén file<br>2. Cài đặt font<br>3. Mở ứng dụng', 'Tặng kèm sticker cute.')">Xem chi tiết ✨</button>
            </div>

            <div class="product-card">
                <div style="font-size: 60px;">🧸</div>
                <h3>Gấu Bông Ảo</h3>
                <p>Gấu bông nhảy múa trên màn hình.</p>
                <button class="btn" onclick="openModal('Gấu Bông Ảo', 'Gấu bông ảo vui nhộn.', 'Chạy trực tiếp file exe.', 'Free skin gấu hồng.')">Xem chi tiết ✨</button>
            </div>
        </div>
    </div>

    <footer><p>© 2026 Share Linh Tinh @_@</p></footer>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div style="padding: 25px 30px 10px 30px;"><h2 id="m-title" style="color: var(--btn-color); font-size: 26px;"></h2></div>
            
            <div class="modal-tabs">
                <button class="modal-tab-btn active" onclick="switchTab(0)">Mô tả</button>
                <button class="modal-tab-btn" onclick="switchTab(1)">Cách dùng</button>
                <button class="modal-tab-btn" onclick="switchTab(2)">Quà tặng</button>
            </div>

            <div class="modal-body">
                <div id="pane-0" class="tab-pane active"></div>
                <div id="pane-1" class="tab-pane"></div>
                <div id="pane-2" class="tab-pane"></div>
            </div>

            <div style="padding: 20px; text-align: center; border-top: 1px solid #eee;">
                <a href="#" class="btn">⬇️ Link Tải Ở Đây Nè</a>
            </div>
        </div>
    </div>

    <script>
        const body = document.body;
        const snowBtn = document.getElementById('snow-toggle');
        const themeBtn = document.getElementById('theme-toggle');

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            themeBtn.innerHTML = '☀️ Sáng Lên';
        }

        function toggleTheme() {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            themeBtn.innerHTML = isDark ? '☀️ Sáng Lên' : '🌙 Tối Đi';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        let snowInterval;
        let isSnowing = localStorage.getItem('snow') === 'on';
        function createSnow() {
            const s = document.createElement('div'); s.className = 'snowflake'; s.innerHTML = '❄';
            s.style.left = Math.random() * 100 + 'vw'; s.style.opacity = Math.random();
            s.style.fontSize = Math.random() * 10 + 10 + 'px'; s.style.animationDuration = Math.random() * 3 + 2 + 's';
            body.appendChild(s); setTimeout(() => s.remove(), 5000);
        }
        function toggleSnow() {
            if (isSnowing) { clearInterval(snowInterval); snowBtn.innerHTML = '❄️ Tuyết: Tắt'; localStorage.setItem('snow', 'off'); }
            else { snowInterval = setInterval(createSnow, 150); snowBtn.innerHTML = '❄️ Tuyết: Bật'; localStorage.setItem('snow', 'on'); }
            isSnowing = !isSnowing;
        }
        if (isSnowing) { snowInterval = setInterval(createSnow, 150); snowBtn.innerHTML = '❄️ Tuyết: Bật'; }

        function openModal(title, d, u, g) {
            document.getElementById('m-title').innerText = title;
            document.getElementById('pane-0').innerHTML = d;
            document.getElementById('pane-1').innerHTML = u;
            document.getElementById('pane-2').innerHTML = g;
            document.getElementById('detailModal').style.display = 'flex';
            switchTab(0);
        }

        function switchTab(index) {
            const btns = document.querySelectorAll('.modal-tab-btn');
            const panes = document.querySelectorAll('.tab-pane');
            btns.forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
                panes[i].classList.toggle('active', i === index);
            });
        }

        function closeModal() { document.getElementById('detailModal').style.display = 'none'; }
        window.onclick = (e) => { if (e.target.id === 'detailModal') closeModal(); }
    </script>
</body>
</html>
