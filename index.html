<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Linh Tinh 🎐</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fff0f5; --text-color: #5c404c; --card-bg: #ffffff;
            --nav-bg: #ffb6c1; --btn-color: #ff69b4; --shadow: 0 4px 15px rgba(255, 105, 180, 0.2);
        }
        .dark-mode {
            --bg-color: #2b2b36; --text-color: #f8f8f2; --card-bg: #383a59;
            --nav-bg: #1e1e28; --btn-color: #bd93f9; --shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; transition: 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; min-height: 100vh; }

        /* --- TUYẾT RƠI --- */
        .snowflake { position: fixed; top: -10px; color: white; user-select: none; z-index: 9999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(105vh); } }

        /* --- NAV --- */
        nav { background-color: var(--nav-bg); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: 700; text-decoration: none; color: var(--text-color); cursor: pointer; }
        .nav-btns { display: flex; gap: 10px; }
        .toggle-btn { background-color: var(--card-bg); border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; color: var(--text-color); font-size: 13px; }

        /* --- TRANG CHỦ --- */
        #home-page { max-width: 1000px; margin: 40px auto; padding: 20px; text-align: center; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .product-card { background-color: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: var(--shadow); cursor: pointer; }
        .product-card:hover { transform: translateY(-8px); }

        /* --- TRANG CHI TIẾT (MẶC ĐỊNH GIẤU) --- */
        #detail-page { display: none; max-width: 850px; margin: 30px auto; padding: 20px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .back-btn { cursor: pointer; display: inline-block; margin-bottom: 20px; font-weight: bold; color: var(--btn-color); font-size: 18px; }
        .detail-card { background: var(--card-bg); border-radius: 25px; box-shadow: var(--shadow); overflow: hidden; }
        .detail-header { padding: 30px; border-bottom: 1px solid rgba(0,0,0,0.05); }

        /* TAB SYSTEM TRÊN TRANG MỚI */
        .tabs { display: flex; background: rgba(0,0,0,0.03); }
        .tab-btn { flex: 1; padding: 20px; border: none; background: none; cursor: pointer; font-weight: bold; color: #888; font-size: 16px; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--btn-color); border-bottom: 3px solid var(--btn-color); background: var(--card-bg); }

        .pane { display: none; padding: 40px; line-height: 1.8; font-size: 17px; min-height: 250px; }
        .pane.active { display: block; }

        .footer-action { padding: 25px; text-align: center; border-top: 1px solid rgba(0,0,0,0.05); }
        .btn-large { background: var(--btn-color); color: white; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 18px; display: inline-block; }

        footer { text-align: center; padding: 30px; background-color: var(--nav-bg); margin-top: 50px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="goHome()">🌸 Share Linh Tinh</div>
        <div class="nav-btns">
            <button class="toggle-btn" onclick="toggleSnow()">❄️ Tuyết</button>
            <button class="toggle-btn" onclick="toggleTheme()">🌙</button>
        </div>
    </nav>

    <div id="home-page">
        <h1>Chào mừng đến với Share Linh Tinh 🎀</h1>
        <div class="product-grid">
            <div class="product-card" onclick="openProduct('Món Đồ Cute 1', 'Đây là nội dung mô tả sản phẩm 1 thật dài và chi tiết...', 'Bước 1: Tải về<br>Bước 2: Cài đặt<br>Bước 3: Tận hưởng', 'Kèm theo bộ sticker cực xinh!')">
                <div style="font-size: 60px;">📦</div>
                <h3>Món Đồ Cute 1</h3>
                <p>Bấm để xem chi tiết trang riêng ✨</p>
            </div>
            
            <div class="product-card" onclick="openProduct('Gấu Bông Ảo', 'Gấu bông này sẽ mang lại niềm vui cho màn hình của bạn.', 'Mở file lên là chạy ngay.', 'Free skin gấu hồng.')">
                <div style="font-size: 60px;">🧸</div>
                <h3>Gấu Bông Ảo</h3>
                <p>Bấm để xem chi tiết trang riêng ✨</p>
            </div>
        </div>
    </div>

    <div id="detail-page">
        <div class="back-btn" onclick="goHome()">← Quay lại trang chủ</div>
        
        <div class="detail-card">
            <div class="detail-header">
                <h1 id="d-title" style="color: var(--btn-color); font-size: 32px;"></h1>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab(0)">Mô tả</button>
                <button class="tab-btn" onclick="switchTab(1)">Cách dùng</button>
                <button class="tab-btn" onclick="switchTab(2)">Quà tặng</button>
            </div>

            <div class="tab-content">
                <div id="p-0" class="pane active"></div>
                <div id="p-1" class="pane"></div>
                <div id="p-2" class="pane"></div>
            </div>

            <div class="footer-action">
                <a href="#" class="btn-large">⬇️ Tải Xuống / Mua Ngay</a>
            </div>
        </div>
    </div>

    <footer><p>© 2026 Share Linh Tinh @_@</p></footer>

    <script>
        // --- LOGIC CHUYỂN TRANG ẢO ---
        function openProduct(title, desc, usage, gift) {
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('detail-page').style.display = 'block';
            
            document.getElementById('d-title').innerText = title;
            document.getElementById('p-0').innerHTML = desc;
            document.getElementById('p-1').innerHTML = usage;
            document.getElementById('p-2').innerHTML = gift;
            
            window.scrollTo(0,0);
            switchTab(0);
        }

        function goHome() {
            document.getElementById('home-page').style.display = 'block';
            document.getElementById('detail-page').style.display = 'none';
            window.scrollTo(0,0);
        }

        function switchTab(index) {
            const btns = document.querySelectorAll('.tab-btn');
            const panes = document.querySelectorAll('.pane');
            btns.forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
                panes[i].classList.toggle('active', i === index);
            });
        }

        // --- CÁC TÍNH NĂNG CŨ ---
        const body = document.body;
        function toggleTheme() { body.classList.toggle('dark-mode'); }
        
        let snowActive = false;
        let snowInt;
        function createSnow() {
            const s = document.createElement('div'); s.className = 'snowflake'; s.innerHTML = '❄';
            s.style.left = Math.random() * 100 + 'vw'; s.style.fontSize = Math.random() * 10 + 10 + 'px';
            s.style.animationDuration = Math.random() * 3 + 2 + 's';
            body.appendChild(s); setTimeout(() => s.remove(), 5000);
        }
        function toggleSnow() {
            if (snowActive) clearInterval(snowInt);
            else snowInt = setInterval(createSnow, 150);
            snowActive = !snowActive;
        }
    </script>
</body>
</html>
