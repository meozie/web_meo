    <script>
        // --- HIỆU ỨNG TUYẾT RƠI CHẬM NHẤT CÓ THỂ ---
        let snowInterval;
        let isSnowing = false;

        function createSnow() {
            const s = document.createElement('div');
            s.className = 'snowflake';
            s.innerHTML = '❄';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.opacity = Math.random() * 0.5 + 0.2; // Làm tuyết mờ hơn một chút cho nhẹ nhàng
            
            // Kích thước hạt tuyết siêu nhỏ
            s.style.fontSize = Math.random() * 4 + 4 + 'px'; 
            
            // Tốc độ rơi: Siêu chậm (từ 15 đến 25 giây mới rơi hết màn hình)
            const slowSpeed = Math.random() * 10 + 15;
            s.style.animationDuration = slowSpeed + 's'; 
            
            document.body.appendChild(s);
            
            // Xóa hạt tuyết sau khi đã rơi xong (khớp với thời gian slowSpeed)
            setTimeout(() => s.remove(), slowSpeed * 1000);
        }

        function toggleSnow() {
            const btn = document.getElementById('snow-toggle');
            if (isSnowing) {
                clearInterval(snowInterval);
                btn.innerHTML = '❄️ Tuyết: Tắt';
            } else {
                // Tạo hạt tuyết mới chậm hơn (800ms mới ra 1 hạt thay vì 250ms)
                snowInterval = setInterval(createSnow, 800); 
                btn.innerHTML = '❄️ Tuyết: Bật';
            }
            isSnowing = !isSnowing;
        }
    </script>
