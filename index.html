<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Linh Tinh 🎐</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #fff0f5; --text-color: #5c404c; --card-bg: #ffffff; --nav-bg: #ffb6c1; --btn-color: #ff69b4; --shadow: 0 4px 15px rgba(255, 105, 180, 0.2); }
        .dark-mode { --bg-color: #2b2b36; --text-color: #f8f8f2; --card-bg: #383a59; --nav-bg: #1e1e28; --btn-color: #bd93f9; --shadow: 0 4px 15px rgba(0, 0, 0, 0.5); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; transition: background-color 0.3s, color 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; min-height: 100vh; }
        .snowflake { position: fixed; top: -10px; color: white; user-select: none; z-index: 9999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(105vh); } }
        nav { background-color: var(--nav-bg); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: 700; text-decoration: none; color: var(--text-color); }
        .nav-btns { display: flex; gap: 10px; }
        .toggle-btn { background-color: var(--card-bg); border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; color: var(--text-color); font-size: 13px; }
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; text-align: center; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .product-card { background-color: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: var(--shadow); transition: transform 0.3s ease; }
        .product-card:hover { transform: translateY(-8px); }
        .btn { background-color: var(--btn-color); color: white; border: none; padding: 10px 20px; border-radius: 15px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background-color: var(--card-bg); padding: 30px; border-radius: 20px; max-width: 400px; width: 90%; position: relative; text-align: center; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; }
        footer { text-align: center; padding: 30px; background-color: var(--nav-bg); margin-top: 50px; }
    </style>
</head>
<body>
    <nav>
        <a href="#" class="logo">🌸 Share Linh Tinh</a>
        <div class="nav-btns">
            <button class="toggle-btn" id="snow-toggle" onclick="toggleSnow()">❄️ Tuyết: Tắt</button>
            <button class="toggle-btn" id="theme-toggle" onclick="toggleTheme()">🌙 Tối Đi</button>
        </div>
    </nav>
    <div class="container">
        <h1>Chào mừng đến với Share Linh Tinh 🎀</h1>
        <div class="product-grid">
            <div class="product-card">
                <div style="font-size: 60px;">📦</div>
                <h3>Món Đồ Cute 1</h3>
                <button class="btn" onclick="openModal('Món Đồ Cute 1', 'Tải về và giải nén nhé!')">Xem chi tiết ✨</button>
            </div>
            <div class="product-card">
                <div style="font-size: 60px;">🧸</div>
                <h3>Gấu Bông Ảo</h3>
                <button class="btn" onclick="openModal('Gấu Bông Ảo', 'Mở lên là có gấu nhảy múa nè!')">Xem chi tiết ✨</button>
            </div>
        </div>
    </div>
    <footer><p>© 2026 Share Linh Tinh @_@</p></footer>
    <div class="modal" id="productModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle"></h2><br>
            <p id="modalUsage" style="text-align: left;"></p><br>
            <a href="#" target="_blank" class="btn">⬇️ Link Tải Ở Đây Nè</a>
        </div>
    </div>
    <script>
        const body = document.body;
        const snowBtn = document.getElementById('snow-toggle');
        const themeBtn = document.getElementById('theme-toggle');
        if (localStorage.getItem('theme') === 'dark') { body.classList.add('dark-mode'); themeBtn.innerHTML = '☀️ Sáng Lên'; }
        function toggleTheme() { body.classList.toggle('dark-mode'); const isDark = body.classList.contains('dark-mode'); themeBtn.innerHTML = isDark ? '☀️ Sáng Lên' : '🌙 Tối Đi'; localStorage.setItem('theme', isDark ? 'dark' : 'light'); }
        let snowInterval; let isSnowing = localStorage.getItem('snow') === 'on';
        function createSnow() { const s = document.createElement('div'); s.className = 'snowflake'; s.innerHTML = '❄'; s.style.left = Math.random() * 100 + 'vw'; s.style.opacity = Math.random(); s.style.fontSize = Math.random() * 10 + 10 + 'px'; s.style.animationDuration = Math.random() * 3 + 2 + 's'; body.appendChild(s); setTimeout(() => s.remove(), 5000); }
        function startSnow() { snowInterval = setInterval(createSnow, 150); }
        if (isSnowing) { startSnow(); snowBtn.innerHTML = '❄️ Tuyết: Bật'; }
        function toggleSnow() { if (isSnowing) { clearInterval(snowInterval); snowBtn.innerHTML = '❄️ Tuyết: Tắt'; localStorage.setItem('snow', 'off'); } else { startSnow(); snowBtn.innerHTML = '❄️ Tuyết: Bật'; localStorage.setItem('snow', 'on'); } isSnowing = !isSnowing; }
        function openModal(t, u) { document.getElementById('modalTitle').innerText = t; document.getElementById('modalUsage').innerHTML = u; document.getElementById('productModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('productModal').style.display = 'none'; }
        window.onclick = (e) => { if (e.target.id === 'productModal') closeModal(); }
    </script>
</body>
</html>
