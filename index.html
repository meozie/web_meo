<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Linh Tinh 🎐</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1e1e28; 
            --text-color: #f8f8f2; 
            --card-bg: #2b2b36; 
            --nav-bg: #181820; 
            --btn-color: #bd93f9; 
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; transition: all 0.3s ease; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; min-height: 100vh; }

        /* --- TUYẾT RƠI SIÊU CHẬM --- */
        .snowflake { position: fixed; top: -10px; color: white; user-select: none; z-index: 9999; pointer-events: none; animation: fall linear forwards; font-size: 8px; }
        @keyframes fall { to { transform: translateY(105vh); } }

        /* --- NAV --- */
        nav { background-color: var(--nav-bg); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: 700; text-decoration: none; color: var(--btn-color); }

        .toggle-btn { background-color: var(--card-bg); border: 1px solid var(--btn-color); padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; color: var(--text-color); }

        .container { max-width: 1100px; margin: 40px auto; padding: 20px; text-align: center; }
        .section-title { margin: 50px 0 20px; font-size: 28px; display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--btn-color); }
        .section-title::before, .section-title::after { content: ""; flex: 1; height: 1px; background: rgba(189, 147, 249, 0.3); max-width: 100px; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; margin-bottom: 50px; justify-content: center; }
        
        /* --- THẺ SẢN PHẨM --- */
        .product-card { 
            background-color: var(--card-bg); border-radius: 25px; padding: 25px; 
            text-decoration: none; color: inherit; display: block; max-width: 320px; margin: auto;
            border: 2px solid transparent; /* Viền mặc định trong suốt */
            position: relative; overflow: hidden;
        }

        /* HIỆU ỨNG RÊ CHUỘT: PHÁT SÁNG ĐỔI MÀU */
        .product-card:hover { 
            transform: translateY(-10px); 
            animation: rainbowBorder 3s linear infinite; /* Chạy hiệu ứng đổi màu viền */
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        /* Định nghĩa các màu phát sáng */
        @keyframes rainbowBorder {
            0% { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; } /* Xanh lá */
            20% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; } /* Đỏ */
            40% { border-color: #ffff00; box-shadow: 0 0 15px #ffff00; } /* Vàng */
            60% { border-color: #9400d3; box-shadow: 0 0 15px #9400d3; } /* Tím */
            80% { border-color: #ff69b4; box-shadow: 0 0 15px #ff69b4; } /* Hồng */
            100% { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
        }

        .icon-box { 
            width: 120px; height: 120px; margin: 0 auto 15px; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; border-radius: 20px;
        }
        .icon-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Chỉ phóng to nhẹ ảnh, KHÔNG NGHIÊN */
        .product-card:hover .icon-box { transform: scale(1.05); }

        .btn { background-color: var(--btn-color); color: #1e1e28; border: none; padding: 10px 22px; border-radius: 12px; font-weight: bold; display: inline-block; margin-top: 15px; font-size: 14px; }

        footer { text-align: center; padding: 40px; background-color: var(--nav-bg); margin-top: 50px; opacity: 0.6; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">🌸 Share Linh Tinh</a>
        <button class="toggle-btn" id="snow-toggle" onclick="toggleSnow()">❄️ Tuyết: Tắt</button>
    </nav>

    <div class="container">
        <h1>Cửa Hàng Của Duy 🎀</h1>
        <p style="opacity: 0.7; margin-bottom: 30px;">Giao diện Neon - Hiệu ứng viền đổi màu</p>

        <h2 class="section-title">Share Tiện Ích</h2>
        <div class="product-grid">
            <a href="sanpham1.html" class="product-card">
                <div class="icon-box">
                    <img src="img/story.jpg" alt="Facebook Story">
                </div>
                <h3>Facebook Story Emotions</h3>
                <p style="font-size: 14px; opacity: 0.7;">Thả nhiều cảm xúc khác trên story facebook.</p>
                <div class="btn">Xem chi tiết ✨</div>
            </a>
        </div>

        <h2 class="section-title">Share Việt Hóa</h2>
        <div class="product-grid">
            <a href="sanpham-quan-ao.html" class="product-card">
                <div class="icon-box">
                    <img src="img/github.jpg" alt="Github Việt Hóa">
                </div>
                <h3>Github Việt Hóa</h3>
                <p style="font-size: 14px; opacity: 0.7;">Giao diện Github bằng tiếng Việt cực xịn.</p>
                <div class="btn">Xem chi tiết ✨</div>
            </a>
        </div>
    </div>

    <footer><p>© 2026 Share Linh Tinh 🎉</p></footer>

    <script>
        let snowInterval;
        let isSnowing = false;

        function createSnow() {
            const s = document.createElement('div');
            s.className = 'snowflake';
            s.innerHTML = '❄';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.opacity = Math.random() * 0.5 + 0.2;
            s.style.fontSize = Math.random() * 4 + 4 + 'px'; 
            const slowSpeed = Math.random() * 10 + 15;
            s.style.animationDuration = slowSpeed + 's'; 
            document.body.appendChild(s);
            setTimeout(() => s.remove(), slowSpeed * 1000);
        }

        function toggleSnow() {
            const btn = document.getElementById('snow-toggle');
            if (isSnowing) {
                clearInterval(snowInterval);
                btn.innerHTML = '❄️ Tuyết: Tắt';
            } else {
                snowInterval = setInterval(createSnow, 800);
                btn.innerHTML = '❄️ Tuyết: Bật';
            }
            isSnowing = !isSnowing;
        }
    </script>
</body>
</html>
